<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Календарь Заметок</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.top{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.admin{background:#2563eb;color:white;}
.logout{background:#dc2626;color:white;}

.month{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.day{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    min-height:90px;
    cursor:pointer;
}

.day:hover{
    background:#334155;
}

.note{
    background:#2563eb;
    margin-top:5px;
    padding:5px;
    border-radius:5px;
    font-size:12px;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    width:320px;
}

input,textarea{
    width:100%;
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    border:none;
}

textarea{height:100px;}

.save{
    background:#16a34a;
    color:white;
    width:100%;
    margin-top:10px;
}

.close{
    background:#dc2626;
    color:white;
    width:100%;
    margin-top:10px;
}

#fullText{
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>📅 Календарь Заметок</h1>

<div class="top">
<button class="admin" onclick="openLogin()">Админ</button>
<button class="logout" onclick="logout()">Выйти</button>
</div>

<div class="month">
<button onclick="prev()">⬅</button>
<h2 id="title"></h2>
<button onclick="next()">➡</button>
</div>

<div class="calendar" id="calendar"></div>

</div>

<!-- LOGIN -->
<div class="modal" id="login">
<div class="box">
<h3>Вход</h3>
<input type="password" id="pass">
<button class="save" onclick="login()">Войти</button>
<button class="close" onclick="closeLogin()">Закрыть</button>
</div>
</div>

<!-- EDIT -->
<div class="modal" id="note">
<div class="box">
<h3>Редактировать</h3>
<input type="number" id="day">
<textarea id="text"></textarea>
<button class="save" onclick="save()">Сохранить</button>
<button class="close" onclick="closeNote()">Закрыть</button>
</div>
</div>

<!-- VIEW -->
<div class="modal" id="view">
<div class="box">
<h3>Заметка</h3>
<div id="fullText"></div>
<button class="close" onclick="closeView()">Закрыть</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5MX30P9T3UbX_YwM5skDtZKX42Ad7MrY",
  authDomain: "parvizadmin.firebaseapp.com",
  projectId: "parvizadmin",
  storageBucket: "parvizadmin.appspot.com",
  messagingSenderId: "494437832678",
  appId: "1:494437832678:web:79cbdc7a814ce8ce406827"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.doc = doc;
window.setDoc = setDoc;
window.getDoc = getDoc;
</script>

<script>
const cal = document.getElementById("calendar");
const title = document.getElementById("title");

let m = new Date().getMonth();
let y = new Date().getFullYear();

let admin = false;
const PASS = "12345";

const months = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];

async function draw(){

    cal.innerHTML = "";
    title.innerText = months[m] + " " + y;

    let first = new Date(y,m,1).getDay();
    first = first === 0 ? 7 : first;

    for(let i=1;i<first;i++){
        cal.innerHTML += `<div></div>`;
    }

    let days = new Date(y,m+1,0).getDate();

    for(let d=1; d<=days; d++){

        let key = y+"-"+m+"-"+d;
        let text = "";

        try{
            let snap = await getDoc(doc(db,"notes",key));
            if(snap.exists()) text = snap.data().text;
        }catch(e){}

        cal.innerHTML += `
        <div class="day" onclick="openDay(${d})">
            <b>${d}</b>

            ${text ? `<div class="note">${text}</div>` : ""}
        </div>`;
    }
}

draw();

function next(){ m++; if(m>11){m=0;y++;} draw(); }
function prev(){ m--; if(m<0){m=11;y--;} draw(); }

window.openDay = async function(d){

    let key = y+"-"+m+"-"+d;
    let snap = await getDoc(doc(db,"notes",key));

    let text = snap.exists() ? snap.data().text : "";

    // ВСЕ пользователи видят заметку
    document.getElementById("view").style.display = "flex";
    document.getElementById("fullText").innerText = text;

    // если админ — можно редактировать
    if(admin){
        document.getElementById("note").style.display = "flex";
        document.getElementById("day").value = d;
        document.getElementById("text").value = text;
    }
}

function openLogin(){ document.getElementById("login").style.display="flex"; }
function closeLogin(){ document.getElementById("login").style.display="none"; }

function login(){
    if(document.getElementById("pass").value === PASS){
        admin = true;
        alert("Админ вошёл");
        closeLogin();
    } else alert("Неверно");
}

function logout(){ admin = false; alert("Вы вышли"); }

async function save(){

    let d = document.getElementById("day").value;
    let t = document.getElementById("text").value;

    let key = y+"-"+m+"-"+d;

    await setDoc(doc(db,"notes",key),{text:t});

    closeNote();
    draw();
}

function closeNote(){ document.getElementById("note").style.display="none"; }
function closeView(){ document.getElementById("view").style.display="none"; }

window.next = next;
window.prev = prev;
window.openLogin = openLogin;
window.closeLogin = closeLogin;
window.login = login;
window.logout = logout;
window.save = save;
window.closeNote = closeNote;
window.closeView = closeView;

</script>

</body>
</html>
