
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Календарь Заметок</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
    min-height:100vh;
}

.container{
    max-width:1200px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:40px;
}

.info{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:20px;
}

.top-panel{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.admin-btn{
    background:#2563eb;
    color:white;
}

.logout-btn{
    background:#dc2626;
    color:white;
}

.month-control{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:20px;
}

.month-control h2{
    font-size:30px;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:10px;
}

.day-name{
    background:#1e293b;
    padding:15px;
    text-align:center;
    border-radius:10px;
    font-weight:bold;
}

.day{
    background:#1e293b;
    min-height:120px;
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    overflow:hidden;
}

.day:hover{
    background:#334155;
}

.day-number{
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}

.note{
    background:#2563eb;
    padding:8px;
    border-radius:8px;
    margin-top:5px;
    font-size:14px;
    overflow:hidden;
    text-overflow:ellipsis;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.modal-content{
    background:#1e293b;
    width:90%;
    max-width:450px;
    padding:25px;
    border-radius:20px;
}

.modal-content h2{
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:16px;
}

textarea{
    resize:none;
    height:140px;
}

.save-btn{
    background:#16a34a;
    color:white;
    width:100%;
}

.close-btn{
    background:#dc2626;
    color:white;
    width:100%;
    margin-top:10px;
}

#viewText{
    background:#334155;
    padding:15px;
    border-radius:10px;
    min-height:150px;
    line-height:1.7;
    white-space:pre-wrap;
}

@media(max-width:700px){

    .calendar{
        grid-template-columns:repeat(2,1fr);
    }

}

</style>
</head>
<body>

<div class="container">

<h1>📅 Календарь Заметок</h1>

<div class="info">
Только админ может добавлять и редактировать заметки.
Пользователи могут только читать.
</div>

<div class="top-panel">

<button class="admin-btn" onclick="openLogin()">
Вход Админа
</button>

<button class="logout-btn" onclick="logout()">
Выйти
</button>

</div>

<div class="month-control">

<button onclick="prevMonth()">⬅</button>

<h2 id="monthTitle"></h2>

<button onclick="nextMonth()">➡</button>

</div>

<div class="calendar" id="calendar"></div>

</div>

<!-- LOGIN -->

<div class="modal" id="loginModal">

<div class="modal-content">

<h2>Вход Админа</h2>

<input
type="password"
id="adminPassword"
placeholder="Введите пароль">

<button
class="save-btn"
onclick="login()">
Войти
</button>

<button
class="close-btn"
onclick="closeLogin()">
Закрыть
</button>

</div>

</div>

<!-- ADD NOTE -->

<div class="modal" id="noteModal">

<div class="modal-content">

<h2>Добавить заметку</h2>

<input
type="number"
id="noteDay"
placeholder="День">

<textarea
id="noteText"
placeholder="Введите текст">
</textarea>

<button
class="save-btn"
onclick="saveNote()">
Сохранить
</button>

<button
class="close-btn"
onclick="closeNoteModal()">
Закрыть
</button>

</div>

</div>

<!-- VIEW NOTE -->

<div class="modal" id="viewModal">

<div class="modal-content">

<h2>Заметка</h2>

<div id="viewText"></div>

<button
class="close-btn"
onclick="closeViewModal()">
Закрыть
</button>

</div>

</div>

<script>

const calendar =
document.getElementById("calendar");

const monthTitle =
document.getElementById("monthTitle");

const months = [
"Январь","Февраль","Март","Апрель",
"Май","Июнь","Июль","Август",
"Сентябрь","Октябрь","Ноябрь","Декабрь"
];

const days = [
"Пн","Вт","Ср","Чт","Пт","Сб","Вс"
];

let currentMonth = new Date().getMonth();

let currentYear = new Date().getFullYear();

let isAdmin = false;

const ADMIN_PASSWORD = "12345";

function createCalendar(){

    calendar.innerHTML = "";

    monthTitle.innerText =
    months[currentMonth] + " " + currentYear;

    days.forEach(day=>{

        calendar.innerHTML += `
        <div class="day-name">
            ${day}
        </div>
        `;

    });

    const daysInMonth =
    new Date(
        currentYear,
        currentMonth + 1,
        0
    ).getDate();

    const savedNotes =
    JSON.parse(
        localStorage.getItem("notes")
    ) || {};

    for(let i=1;i<=daysInMonth;i++){

        const key =
        currentYear + "-" +
        currentMonth + "-" +
        i;

        let noteHTML = "";

        if(savedNotes[key]){

            noteHTML = `
            <div class="note">
                ${savedNotes[key]}
            </div>
            `;
        }

        calendar.innerHTML += `
        <div
        class="day"
        onclick="openNoteModal(${i})">

            <div class="day-number">
                ${i}
            </div>

            ${noteHTML}

        </div>
        `;
    }
}

createCalendar();

function nextMonth(){

    currentMonth++;

    if(currentMonth > 11){

        currentMonth = 0;

        currentYear++;
    }

    createCalendar();
}

function prevMonth(){

    currentMonth--;

    if(currentMonth < 0){

        currentMonth = 11;

        currentYear--;
    }

    createCalendar();
}

function openLogin(){

    document.getElementById(
        "loginModal"
    ).style.display = "flex";
}

function closeLogin(){

    document.getElementById(
        "loginModal"
    ).style.display = "none";
}

function login(){

    const password =
    document.getElementById(
        "adminPassword"
    ).value;

    if(password === ADMIN_PASSWORD){

        isAdmin = true;

        alert("Вы вошли как админ");

        closeLogin();

    }else{

        alert("Неверный пароль");
    }
}

function logout(){

    isAdmin = false;

    alert("Вы вышли");
}

function openNoteModal(day){

    const key =
    currentYear + "-" +
    currentMonth + "-" +
    day;

    const notes =
    JSON.parse(
        localStorage.getItem("notes")
    ) || {};

    const noteText = notes[key];

    // USER READ ONLY

    if(!isAdmin){

        if(noteText){

            document.getElementById(
                "viewModal"
            ).style.display = "flex";

            document.getElementById(
                "viewText"
            ).innerText = noteText;
        }

        return;
    }

    // ADMIN EDIT

    document.getElementById(
        "noteModal"
    ).style.display = "flex";

    document.getElementById(
        "noteDay"
    ).value = day;

    document.getElementById(
        "noteText"
    ).value = noteText || "";
}

function closeNoteModal(){

    document.getElementById(
        "noteModal"
    ).style.display = "none";
}

function closeViewModal(){

    document.getElementById(
        "viewModal"
    ).style.display = "none";
}

function saveNote(){

    const day =
    document.getElementById(
        "noteDay"
    ).value;

    const text =
    document.getElementById(
        "noteText"
    ).value;

    const key =
    currentYear + "-" +
    currentMonth + "-" +
    day;

    let notes =
    JSON.parse(
        localStorage.getItem("notes")
    ) || {};

    notes[key] = text;

    localStorage.setItem(
        "notes",
        JSON.stringify(notes)
    );

    closeNoteModal();

    createCalendar();

    document.getElementById(
        "noteText"
    ).value = "";
}

</script>

</body>
</html>
